vailability and Provenance Statements\n\n### Anthropic Economic Index (AEI) v5\n\nThe AEI raw data are published by Anthropic under a CC-BY 4.0 license (Anthropic, 2026). The `.csv` files were downloaded from https://huggingface.co/datasets/Anthropic/EconomicIndex/tree/main/release_2026_03_24/data. The upstream documentation is mirrored in this package as `data/raw/data_documentation.md`. This is the fifth AEI release (2026-03-24). Two raw long-format files are consumed:\n\n| Raw file | Platform | Geography |\n|----------|----------|-----------|\n| `aei_raw_claude_ai_2026-02-05_to_2026-02-12.csv` | Claude AI (Free and Pro) | global, country, country-state |\n| `aei_raw_1p_api_2026-02-05_to_2026-02-12.csv` | 1P API | global only |\n\nEach raw row is one `(geo_id, date, facet, variable, cluster_name, value)` tuple. The 1P API release is \"based on a sample of 1P API traffic and analyzed using privacy-preserving methods\" and has no geographic breakdown.\n\n### O\\*NET 30.1 Database\n\nThe task dimension is joined to official O\\*NET 30.1 task statements, distributed as a `bead` input under `input/onet-30.1/` (sourced from the National Center for O\\*NET Development; CC-BY 4.0; see `input/onet-30.1/README.md`). Run `bead input load onet-30.1` if `input/onet-30.1/` is empty.\n\n### BTOS Crosswalk\n\nThe `output/dim/iwa_btos_crosswalk.csv` file is an original mapping created for this project, linking 332 O\\*NET Intermediate Work Activities to 10 Bureau of Transportation Statistics (BTOS) activity categories. Category 7 (\"Software coding or debugging\") is used to flag coding tasks.\n\n### Statement about Rights\n\n- [x] I certify that the author(s) of the manuscript have legitimate access to and permission to use the data used in this manuscript.\n- [x] I certify that the author(s) of the manuscript have documented permission to redistribute/publish the data contained within this replication package. Appropriate permissions are documented in the [LICENSE.txt](LICENSE.txt) file.\n\n### License for Data\n\nThe AEI raw data are licensed under CC-BY 4.0 (Anthropic, 2026). The O\\*NET 30.1 data are licensed under CC-BY 4.0 (National Center for O\\*NET Development, 2024). The BTOS crosswalk (`output/dim/iwa_btos_crosswalk.csv`) is an original mapping created for this project. See [LICENSE.txt](LICENSE.txt) for details.\n\n### Summary of Availability\n\n- [x] All data **are** publicly available.\n\n### Details on Each Data Source\n\n| Data Name | Data Files | Location | Provided | Citation |\n|-----------|-----------|----------|----------|----------|\n| AEI raw Claude AI usage | `aei_raw_claude_ai_2026-02-05_to_2026-02-12.csv` | `temp/` (downloaded by `make`) | Yes | Anthropic (2026) |\n| AEI raw 1P API usage | `aei_raw_1p_api_2026-02-05_to_2026-02-12.csv` | `temp/` (downloaded by `make`) | Yes | Anthropic (2026) |\n| O\\*NET 30.1 task statements | `task_statements.parquet` | `input/onet-30.1/` | Yes | O\\*NET (2024) |\n| O\\*NET 30.1 tasks-to-DWAs | `tasks_to_dwas.parquet` | `input/onet-30.1/` | Yes | O\\*NET (2024) |\n| O\\*NET 30.1 DWA reference | `dwa_reference.parquet` | `input/onet-30.1/` | Yes | O\\*NET (2024) |\n| O\\*NET 30.1 IWA reference | `iwa_reference.parquet` | `input/onet-30.1/` | Yes | O\\*NET (2024) |\n| O\\*NET 30.1 content model | `content_model_reference.parquet` | `input/onet-30.1/` | Yes | O\\*NET (2024) |\n| BTOS crosswalk | `iwa_btos_crosswalk.csv` | `output/dim/` | Yes | This project |\n\n## Dataset List\n\n| Data file | Source | Notes | Provided |\n|-----------|--------|-------|----------|\n| `output/dim/task.csv` | AEI + O\\*NET 30.1 | 3,395 task statements matched to O\\*NET | Yes |\n| `output/dim/dwa.csv` | O\\*NET 30.1 | 2,087 Detailed Work Activities | Yes |\n| `output/dim/iwa.csv` | O\\*NET 30.1 | 332 Intermediate Work Activities | Yes |\n| `output/dim/element.csv` | O\\*NET 30.1 | 37 content-model elements | Yes |\n| `output/dim/geo.csv` | AEI | 1,435 geographies | Yes |\n| `output/dim/task_unmatched.csv` | AEI | 247 unmatched task texts | Yes |\n| `output/dim/iwa_btos_crosswalk.csv` | This project | 333 IWA-to-BTOS links | Yes |\n| `output/fct/request_detail.csv` | AEI + O\\*NET | 5,176 global task-level rows | Yes |\n| `output/fct/request_geo.csv` | AEI + O\\*NET | 13,867 per-geography task rows | Yes |\n| `output/fct/iwa_detail.csv` | Derived | 332 IWA-level rows | Yes |\n| `output/fct/element_detail.csv` | Derived | 37 element-level rows | Yes |\n| `output/fct/btos_detail.csv` | Derived | 10 BTOS-category rows | Yes |\n| `data/derived/task_coding_crosswalk.csv` | Derived | 3,395 tasks with coding flag (0/1) | Yes |\n| `data/derived/iwa_coding_crosswalk.csv` | Derived | 9 IWAs flagged as coding (BTOS 7) | Yes |\n| `data/derived/noncoding_by_country.csv` | Derived | 117 countries with noncoding share | Yes |\n| `output/noncoding_by_country.csv` | Derived | 118 countries with noncoding share | Yes |\n| `output/fig/noncoding_by_country.pdf` | Derived | Bar chart of top 20 countries | Yes |\n| `output/element_success_speedup.pdf` | Derived | Element-level figure | Yes |\n| `output/btos_success_speedup.pdf` | Derived | BTOS-level figure | Yes |\n\n## Computational Requirements\n\n### Software Requirements\n\n- GNU Make\n- Stata 18.0 MP (code was last run with version 18 MP; required for `code/*.do` scripts)\n- DuckDB 1.4.4+ (command-line interface; required for SQL scripts in the full pipeline)\n- Python 3.11+ (managed via `uv`; required for plot scripts)\n  - `matplotlib` (installed automatically by `uv run`)\n- `curl` (for downloading raw data from HuggingFace)\n- `bead` (for loading O\\*NET input data)\n\nNo `requirements.txt` or install script is needed for Python; `uv run` handles Python dependencies automatically via PEP 723 inline metadata in each `.py` script.\n\n### Controlled Randomness\n\n- No pseudo-random number generator is used in the analysis described here.\n\n### Memory, Runtime, Storage Requirements\n\n#### Summary\n\n- Approximate time needed to reproduce the analyses: **<10 minutes**\n- Approximate storage space needed: **25 MB -- 250 MB**\n\n#### Details\n\nThe code was last run on a macOS machine. The full `make` pipeline takes approximately 10--30 seconds (excluding data download time). The raw CSV files (~150 MB total) are downloaded from HuggingFace on the first run. O\\*NET Parquet files (~20 MB) are loaded via `bead input load onet-30.1`. Stata scripts in `code/` each run in under 10 seconds.\n\n## Description of Programs/code\n\n### Full pipeline (via `make`)\n\n- `Makefile` -- Orchestrates the full pipeline: downloads raw data, runs all SQL scripts, generates figures, and copies documentation.\n- `normalize.sql` -- Main processing script. Joins AEI task strings to O\\*NET 30.1 `task_statements` (exact match on a normalised key; residuals fall back to Levenshtein fuzzy match within 25% of the longer string, blocked on the first three normalised characters). Pivots the long format to one row per task, splits global vs. per-geography facts, and writes all dimension and fact tables.\n- `iwa_rollup.sql` -- Aggregates task-level facts into IWA-level facts via the DWA hierarchy.\n- `element_rollup.sql` -- Aggregates IWA-level facts into element-level facts (unweighted).\n- `btos_rollup.sql` -- Aggregates IWA-level facts into BTOS activity categories using `output/dim/iwa_btos_crosswalk.csv` (unweighted).\n- `plot_element.py` -- Generates `output/element_success_speedup.pdf` (twin horizontal bar chart of success rate and AI speedup by element).\n- `plot_btos.py` -- Generates `output/btos_success_speedup.pdf` (twin horizontal bar chart of success rate and AI speedup by BTOS category).\n\n### Stata analysis scripts (in `code/`)\n\n- `classify_iwa.do` -- Classifies IWAs as coding vs. non-coding. Reads `dim/iwa_btos_crosswalk.csv`, keeps only BTOS category 7 (\"Software coding or debugging\"). Outputs `data/derived/iwa_coding_crosswalk.csv` (9 IWAs flagged as coding).\n- `classify_tasks.do` -- Applies coding classification to tasks via the DWA hierarchy. Reads `dim/task.csv`, extracts `iwa_id` from `dwa_id` by stripping the D-suffix, merges with `iwa_coding_crosswalk.csv` (left join; unmatched tasks get coding=0). Outputs `data/derived/task_coding_crosswalk.csv` (179 coding, 3,216 non-coding).\n- `noncoding_by_country.do` -- Computes share of non-coding requests by country. Reads `fct/request_geo.csv`, merges coding flags, filters to country-level, aggregates total and non-coding requests per country. Outputs `output/noncoding_by_country.csv` (118 rows).\n- `plot_noncoding_by_country.do` -- Generates horizontal bar chart of top 20 countries by non-coding share. Outputs `output/fig/noncoding_by_country.pdf`.\n- `test_geo_subset.do` -- Validation script. Three tests: (a) every country-state task also appears at country level, (b) no region exceeds country count, (c) sum of regions <= country count (+1 rounding tolerance). All 3 tests PASS: 6,944 region-task pairs verified.\n\n### License for Code\n\nThe code is licensed under the MIT License. See [LICENSE.txt](LICENSE.txt) for details.\n\n## Instructions to Replicators\n\n### Option A: Full pipeline via `make`\n\n1. Ensure DuckDB (>=1.4.4), Python (>=3.11), `uv`, `bead`, `curl`, and GNU Make are installed and on your `PATH`.\n2. Run `make` from the root of this directory. This will:\n   - Download the two AEI raw CSV files from HuggingFace to `temp/`.\n   - Load O\\*NET 30.1 Parquet files via `bead input load onet-30.1` (if not already present).\n   - Run `normalize.sql` to produce all dimension and fact tables in `output/`.\n   - Run rollup SQL scripts to produce IWA, element, and BTOS fact tables.\n   - Run Python plot scripts to produce element and BTOS figures.\n   - Copy `README.md` and `data_documentation.md` to `output/`.\n3. All outputs are written to `output/` and temporary files to `temp/`.\n\n### Option B: Stata analysis scripts only\n\n1. Ensure Stata 18.0 MP (or compatible version) is installed.\n2. Run the following from the `code/` directory:\n   ```\n   /Applications/Stata/StataMP.app/Contents/MacOS/stata-mp -q -b do classify_iwa.do\n   /Applications/Stata/StataMP.app/Contents/MacOS/stata-mp -q -b do classify_tasks.do\n   /Applications/Stata/StataMP.app/Contents/MacOS/stata-mp -q -b do noncoding_by_country.do\n   /Applications/Stata/StataMP.app/Contents/MacOS/stata-mp -q -b do plot_noncoding_by_country.do\n   ```\n3. Run the validation script to verify data integrity:\n   ```\n   /Applications/Stata/StataMP.app/Contents/MacOS/stata-mp -q -b do test_geo_subset.do\n   ```\n4. Outputs are written to `data/derived/` and `output/`.\n\n## List of Tables and Programs\n\n| Output | Program | Note |\n|--------|---------|------|\n| `output/dim/task.csv` | `normalize.sql` | |\n| `output/dim/task_unmatched.csv` | `normalize.sql` | |\n| `output/dim/geo.csv` | `normalize.sql` | |\n| `output/dim/dwa.csv` | `normalize.sql` | Pass-through from O\\*NET |\n| `output/dim/iwa.csv` | `normalize.sql` | Pass-through from O\\*NET |\n| `output/dim/element.csv` | `normalize.sql` | Pass-through from O\\*NET |\n| `output/dim/iwa_btos_crosswalk.csv` | Hand-curated | IWA-to-BTOS mapping |\n| `output/fct/request_detail.csv` | `normalize.sql` | |\n| `output/fct/request_geo.csv` | `normalize.sql` | |\n| `output/fct/iwa_detail.csv` | `iwa_rollup.sql` | |\n| `output/fct/element_detail.csv` | `element_rollup.sql` | |\n| `output/fct/btos_detail.csv` | `btos_rollup.sql` | |\n| `data/derived/iwa_coding_crosswalk.csv` | `code/classify_iwa.do` | 9 coding IWAs |\n| `data/derived/task_coding_crosswalk.csv` | `code/classify_tasks.do` | 3,395 tasks with coding flag |\n| `data/derived/noncoding_by_country.csv` | `code/noncoding_by_country.do` | 117 countries |\n| `output/noncoding_by_country.csv` | `code/noncoding_by_country.do` | 118 countries (includes NONE) |\n| `output/fig/noncoding_by_country.pdf` | `code/plot_noncoding_by_country.do` | Top 20 countries bar chart |\n| `output/element_success_speedup.pdf` | `plot_element.py` | |\n| `output/btos_success_speedup.pdf` | `plot_btos.py` | |\n\n## Schema\n\n### Question\n\nWhat do people use Claude for? Do these requests succeed? Where are users located?\n\n### Grain\n\nWeekly summary, no individual requests. The release covers one week, 2026-02-05 to 2026-02-12. The data is organised as a small star schema with two fact tables and two dimension tables.\n\n### Dimensions\n\n- `output/dim/task.csv` -- the subset of O\\*NET 30.1 task statements that match an AEI task. 3,395 rows, one per `task_id`. Columns:\n  - `task_id` -- official O\\*NET task id (integer, range 1--24,013).\n  - `onetsoc_code` -- O\\*NET-SOC occupation the task belongs to (e.g. `11-1011.00`).\n  - `task_name` -- canonical O\\*NET task statement.\n  - `dwa_id` -- Detailed Work Activity the task maps to. The relationship is **not** 1:1 -- 23% of tasks link to multiple DWAs (sourced from `tasks_to_dwas.parquet`); we keep the smallest `dwa_id` so the dim stays one row per task. Join to `dim/dwa.csv` for the full set.\n  - `date_updated` -- `min(date_updated)` of the underlying DWA links.\n  - `domain_source` -- provenance of the DWA links.\n\n  Where an AEI task text appears under multiple occupations in O\\*NET, we keep the row with the smallest `task_id`.\n- `output/dim/dwa.csv` -- pass-through of O\\*NET 30.1 `dwa_reference`: 2,087 Detailed Work Activities with `element_id`, `iwa_id`, `dwa_id`, `dwa_title`.\n- `output/dim/iwa.csv` -- pass-through of O\\*NET 30.1 `iwa_reference`: Intermediate Work Activities with `element_id`, `iwa_id`, `iwa_title`.\n- `output/dim/element.csv` -- pass-through of O\\*NET 30.1 `content_model_reference`: the hierarchy of O\\*NET content-model nodes with `element_id`, `element_name`, `description`.\n- `output/dim/task_unmatched.csv` -- 247 AEI task texts that could not be matched to any O\\*NET 30.1 statement within the 25% Levenshtein threshold (4% of all distinct AEI tasks).\n- `output/dim/geo.csv` -- `geo_id` and its level of geography. 1,435 rows: 1 `global`, 178 `country` (ISO 3166-1 alpha-2 codes such as `US`, `GB`), and 1,256 `country-state` (ISO 3166-2 codes such as `US-CA`, `AGO-LUA`).\n- `output/dim/iwa_btos_crosswalk.csv` -- mapping from O\\*NET 30.1 Intermediate Work Activities to BTOS activity categories. 333 rows covering 10 categories.\n\n### Fact tables\n\n- `output/fct/request_detail.csv` -- 5,176 rows, one per (`date_start`, `date_end`, `source`, `task`). Global aggregate only. Contains `n_requests`, `pct_successful` (null for `claude` source), token/cost indices (API source only), `human_time` and `ai_time` in minutes.\n\n  > **Unit caveat.** The upstream release stores `human_only_time` in **hours** and `human_with_ai_time` in **minutes** -- a unit mismatch not flagged in `data_documentation.md`. `normalize.sql` multiplies `human_only_time` by 60 so that both columns are expressed in minutes.\n\n- `output/fct/request_geo.csv` -- 13,867 rows, one per (`geo_id`, `date_start`, `date_end`, `task`). Per-geography task counts only (no success/time/cost breakdown by geo). Covers 478 geographies.\n- `output/fct/iwa_detail.csv` -- 332 rows, one per IWA. Rolled up from tasks via DWA hierarchy.\n- `output/fct/element_detail.csv` -- 37 rows, one per element. Rolled up from IWAs.\n- `output/fct/btos_detail.csv` -- 10 rows, one per BTOS category. Rolled up from IWAs via the hand-curated crosswalk.\n\n### Derived outputs\n\n- `data/derived/iwa_coding_crosswalk.csv` -- 9 IWAs flagged as coding (BTOS category 7).\n- `data/derived/task_coding_crosswalk.csv` -- 3,395 tasks with coding flag (179 = coding, 3,216 = non-coding).\n- `data/derived/noncoding_by_country.csv` -- 117 countries with share of non-coding requests.\n- `output/noncoding_by_country.csv` -- 118 countries (includes `NONE` = not_classified).\n- `output/fig/noncoding_by_country.pdf` -- horizontal bar chart, top 20 countries by non-coding share.\n- `output/element_success_speedup.pdf` -- twin horizontal bar chart of success rate and AI speedup by element.\n- `output/btos_success_speedup.pdf` -- twin horizontal bar chart of success rate and AI speedup by BTOS category.\n\n### Geography\n\n- Country codes: ISO 3166-1 alpha-2 (e.g., `US`, `GB`, `HU`)\n- Country-state codes: ISO 3166-2 (e.g., `US-CA`, `HU-BU`)\n- `NONE` / `not_classified`: filtered for privacy, not a real geography\n- Thresholds: >=200 conversations for country, >=100 for country-state\n\n## References\n\nAnthropic. 2026. \"Anthropic Economic Index v5.\" https://huggingface.co/datasets/Anthropic/EconomicIndex\n\nMassenkoff, Maxim, Eva Lyubich, Peter McCrory, Ruth Appel, and Ryan Heller. 2026. \"Anthropic Economic Index report: Learning curves.\" https://www.anthropic.com/research/economic-index-march-2026-report\n\nAppel, Ruth, Maxim Massenkoff, Peter McCrory, Miles McCain, Ryan Heller, Tyler Neylon, and Alex Tamkin. 2026. \"Economic Primitives.\" Chapter 2 in *Anthropic Economic Index report: Learning curves*. https://www.anthropic.com/research/economic-index-march-2026-report\n\nNational Center for O\\*NET Development. 2024. \"O\\*NET 30.1 Database.\" O\\*NET Resource Center. https://www.onetcenter.org/database.html. Sponsored by the U.S. Department of Labor, Employment and Training Administration.\n"},"result":"Wrote file successfully."}]},{"id":"msg-6","role":"assistant","content":"Created `README.md` at the project root following the template structure. It includes all required sections:\n\n- **Overview** -- summary of the replication package\n- **Data Availability and Provenance Statements** -- AEI, O\\*NET, and BTOS crosswalk sources\n- **Statement about Rights** and **License for Data**\n- **Summary of Availability** -- all data publicly available\n- **Details on Each Data Source** -- table with file locations and citations\n- **Dataset List** -- all provided files\n- **Computational Requirements** -- software, runtime, storage\n- **Description of Programs/code** -- both the full `make` pipeline and the Stata scripts\     tool: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
    chev: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    check: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
    pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',
    logo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
    brain: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-1 7.9V21H9v-6.1A4 4 0 0 1 8 7V6a4 4 0 0 1 4-4z"/><path d="M8 6a4 4 0 0 0-4 4 4 4 0 0 0 3 3.9"/><path d="M16 6a4 4 0 0 1 4 4 4 4 0 0 1-3 3.9"/></svg>',
    skipFwd: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>',
    skipBack: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>',
  };

  // ── Helpers ──
  function h(tag, cls, html) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    if (html) el.innerHTML = html;
    return el;
  }

  function renderMd(text) {
    try { return marked.parse(text); }
    catch(e) { return '<p>' + text.replace(/</g,'&lt;') + '</p>'; }
  }

  function parseMdBlocks(text) {
    var lines = text.split('\n'), blocks = [], cur = [], inCode = false, codeBuf = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.trim().indexOf('\`\`\`') === 0) {
        if (inCode) { codeBuf.push(line); var r = codeBuf.join('\n'); blocks.push({type:'code',raw:r,html:renderMd(r)}); codeBuf=[]; inCode=false; }
        else { if(cur.length){var r2=cur.join('\n');blocks.push({type:'paragraph',raw:r2,html:renderMd(r2)});cur=[];} codeBuf.push(line); inCode=true; }
        continue;
      }
      if (inCode) { codeBuf.push(line); continue; }
      var blank=line.trim()==='', heading=/^#{1,6}\s/.test(line), hr=/^(-{3,}|_{3,}|\*{3,})$/.test(line.trim());
      var isList=/^\s*[-*+]\s/.test(line)||/^\s*\d+\.\s/.test(line), isTable=line.trim().charAt(0)==='|', isBq=line.trim().charAt(0)==='>';
      if (blank||heading||hr||(cur.length>0&&!isList&&!isTable&&!isBq)) {
        if(cur.length){var r3=cur.join('\n');blocks.push({type:'paragraph',raw:r3,html:renderMd(r3)});cur=[];}
        if(hr){blocks.push({type:'hr',raw:line,html:'<hr>'});continue;}
        if(heading){blocks.push({type:'heading',raw:line,html:renderMd(line)});continue;}
        if(blank) continue;
      }
      cur.push(line);
    }
    if(cur.length){var r4=cur.join('\n');blocks.push({type:'paragraph',raw:r4,html:renderMd(r4)});}
    return blocks;
  }

  function fmtSec(sec) {
    sec = Math.floor(sec);
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function fmtTime(ms) {
    return fmtSec(ms / 1000);
  }

  // ── Player ──
  function Player(root, messages, meta, config) {
    this.root = root;
    this.messages = messages;
    this.meta = meta;
    this.config = config;
    this.playing = false;
    this.looping = false;
    this.animatingIndex = -1;  // index of message currently being animated
    this.renderedUpTo = -1;    // index of last fully rendered (instant) message
    this.audioEl = null;
    this.syncCues = null;      // resolved cues: [{audio_s, msgIndex, label, scene}]
    this.audioDriven = false;
    this._abortController = null;
  }

  // ── Build DOM ──
  Player.prototype.build = function() {
    if (!document.getElementById('oce-css')) {
      var style = document.createElement('style');
      style.id = 'oce-css';
      style.textContent = CSS;
      document.head.appendChild(style);
    }

    var w = this.config.width, hh = this.config.height;
    this.root.innerHTML = '';
    var container = h('div','oce');
    container.style.width = '100%';
    container.style.height = '100%';

    // Top bar
    var bar = h('div','oce-bar');
    var barL = h('div','oce-bar-l');
    barL.appendChild(h('span','oce-bar-logo',I.logo));
    barL.appendChild(h('span','oce-bar-title',this.meta.title));
    barL.appendChild(h('span','oce-bar-sep','/'));
    var badge = h('span','oce-badge');
    badge.appendChild(h('span','oce-badge-dot'));
    badge.appendChild(document.createTextNode(this.meta.model));
    barL.appendChild(badge);
    bar.appendChild(barL);

    var barR = h('div','oce-bar-r');
    var self = this;

    if (this.audioDriven) {
      // Skip back button
      this.skipBackBtn = h('div','oce-btn',I.skipBack);
      this.skipBackBtn.title = 'Previous scene';
      this.skipBackBtn.addEventListener('click', function() { self.seekPrevScene(); });
      barR.appendChild(this.skipBackBtn);
    }

    this.playBtn = h('div','oce-btn',I.play);
    this.playBtn.addEventListener('click', function() {
      if (self.playing) self.pause(); else self.play();
    });
    barR.appendChild(this.playBtn);

    if (this.audioDriven) {
      // Skip forward button
      this.skipFwdBtn = h('div','oce-btn',I.skipFwd);
      this.skipFwdBtn.title = 'Next scene';
      this.skipFwdBtn.addEventListener('click', function() { self.seekNextScene(); });
      barR.appendChild(this.skipFwdBtn);
    }

    bar.appendChild(barR);
    container.appendChild(bar);

    // Chat area
    this.chat = h('div','oce-chat');
    container.appendChild(this.chat);

    // Audio bar (if audio-driven)
    if (this.audioDriven) {
      this._buildAudioBar(container);
    }

    // Footer
    var foot = h('div','oce-foot');
    var footL = h('div','oce-foot-l');
    this.statusDot = h('span','oce-sdot');
    footL.appendChild(this.statusDot);
    this.statusLabel = h('span','','Ready');
    footL.appendChild(this.statusLabel);
    foot.appendChild(footL);
    var footR = h('div','oce-foot-r');
    this.elapsedEl = h('span','','0:00');
    footR.appendChild(this.elapsedEl);
    foot.appendChild(footR);
    container.appendChild(foot);

    this.root.appendChild(container);
  };

  // ── Audio bar with timeline and scene markers ──
  Player.prototype._buildAudioBar = function(container) {
    var self = this;
    var audioBar = h('div','oce-audio');

    // Row: time - timeline - time
    var row = h('div','oce-audio-row');
    this.audioTimeEl = h('span','oce-audio-time','0:00');
    this.audioDurEl = h('span','oce-audio-time','0:00');

    var timeline = h('div','oce-timeline');
    var track = h('div','oce-track');
    this.progressEl = h('div','oce-progress');
    track.appendChild(this.progressEl);

    // Scene markers on the track
    var markers = h('div','oce-scene-markers');
    this.sceneMarkerEls = [];
    if (this.syncCues) {
      for (var i = 0; i < this.syncCues.length; i++) {
        var cue = this.syncCues[i];
        if (!cue.scene) continue;
        var dot = h('div','oce-scene-dot');
        dot.dataset.cueIndex = String(i);
        // Tooltip
        if (cue.label) {
          var tip = h('div','oce-scene-tooltip', cue.label);
          dot.appendChild(tip);
        }
        dot.addEventListener('click', (function(c) {
          return function(e) {
            e.stopPropagation();
            self.seekToAudioTime(c.audio_s);
          };
        })(cue));
        markers.appendChild(dot);
        this.sceneMarkerEls.push({ dot: dot, cue: cue });
      }
    }
    track.appendChild(markers);
    timeline.appendChild(track);

    // Click on timeline to seek
    timeline.addEventListener('click', function(e) {
      var rect = track.getBoundingClientRect();
      var frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      // Map fraction to cue-space: offset + frac * sessionDuration
      self.seekToAudioTime(self.audioOffset + frac * self.totalDuration);
    });

    row.appendChild(this.audioTimeEl);
    row.appendChild(timeline);
    row.appendChild(this.audioDurEl);
    audioBar.appendChild(row);

    // Scene buttons row
    if (this.syncCues) {
      var scenes = this.syncCues.filter(function(c) { return c.scene; });
      if (scenes.length > 0) {
        var scenesRow = h('div','oce-scenes');
        this.sceneBtnEls = [];
        for (var si = 0; si < scenes.length; si++) {
          var sc = scenes[si];
          var btn = h('div','oce-scene-btn', (sc.label || 'Scene ' + (si+1)));
          btn.addEventListener('click', (function(c) {
            return function() { self.seekToAudioTime(c.audio_s); };
          })(sc));
          scenesRow.appendChild(btn);
          this.sceneBtnEls.push({ btn: btn, cue: sc });
        }
        audioBar.appendChild(scenesRow);
      }
    }

    container.appendChild(audioBar);

    // Create audio element
    this.audioEl = document.createElement('audio');
    this.audioEl.preload = 'metadata';
    this.audioLoaded = false;
    this.simTime = 0;  // simulated clock (seconds) for when audio can't load

    // Compute total duration from last cue (fallback if no audio)
    this.totalDuration = 0;
    this.audioOffset = AUDIO_OFFSET || 0;
    if (this.syncCues && this.syncCues.length > 0) {
      this.totalDuration = this.syncCues[this.syncCues.length - 1].audio_s - this.audioOffset + 10;
    }

    if (AUDIO_SRC) {
      this.audioEl.src = AUDIO_SRC;
    }

    // Audio events
    this.audioEl.addEventListener('loadedmetadata', function() {
      if (isFinite(self.audioEl.duration) && self.audioEl.duration > 0) {
        self.audioLoaded = true;
        // Use session span, not full file duration
        if (self.audioOffset > 0) {
          // totalDuration stays as computed from cues
        } else {
          self.totalDuration = self.audioEl.duration;
        }
        self.audioDurEl.textContent = fmtSec(self.totalDuration);
        self._positionSceneMarkers();
        console.log('[oce] audio loadedmetadata, duration=' + self.audioEl.duration + ', offset=' + self.audioOffset + ', sessionDuration=' + self.totalDuration);
      }
    });

    this.audioEl.addEventListener('seeked', function() {
      console.log('[oce] audio seeked to ' + self.audioEl.currentTime.toFixed(1));
    });

    this.audioEl.addEventListener('timeupdate', function() {
      self._onAudioTimeUpdate();
    });

    this.audioEl.addEventListener('ended', function() {
      if (self.looping) {
        self.audioEl.currentTime = self.audioOffset;
        self.audioEl.play();
      } else {
        self.pause();
        self.statusLabel.textContent = 'Done';
      }
    });

    this.audioEl.addEventListener('error', function(e) {
      // Audio failed to load — use simulated clock
      console.error('[oce] audio error:', self.audioEl.error ? self.audioEl.error.message : 'unknown', self.audioEl.error);
      self.audioLoaded = false;
      self.audioDurEl.textContent = fmtSec(self.totalDuration);
      self._positionSceneMarkers();
    });

    // Position markers even if audio never loads (use cue-derived duration)
    setTimeout(function() {
      if (!self.audioLoaded) {
        self.audioDurEl.textContent = fmtSec(self.totalDuration);
        self._positionSceneMarkers();
      }
    }, 500);
  };

  // ── Position scene dots on the track ──
  Player.prototype._positionSceneMarkers = function() {
    var dur = this.totalDuration || 1;
    for (var i = 0; i < this.sceneMarkerEls.length; i++) {
      var m = this.sceneMarkerEls[i];
      var pct = ((m.cue.audio_s - this.audioOffset) / dur) * 100;
      m.dot.style.left = pct + '%';
    }
  };

  // ── Get current playback time (audio or simulated) ──
  // Returns time in cue-space (i.e. absolute audio_s values from sync manifest)
  Player.prototype._currentTime = function() {
    if (this.audioLoaded && this.audioEl && isFinite(this.audioEl.duration)) return this.audioEl.currentTime;
    return this.simTime;
  };

  // Returns time relative to session start (for display and progress bar)
  Player.prototype._sessionTime = function() {
    return this._currentTime() - this.audioOffset;
  };

  // ── Audio timeupdate handler — drives the replay ──
  Player.prototype._debugCount = 0;
  Player.prototype._onAudioTimeUpdate = function() {
    var t = this._currentTime();
    var st = this._sessionTime();
    var dur = this.totalDuration || 1;
    if (this._debugCount++ < 20 || this._debugCount % 50 === 0) {
      console.log('[oce] timeupdate: t=' + t.toFixed(1) + ' st=' + st.toFixed(1) + ' rendered=' + this.renderedUpTo);
    }

    // Stop at end of session window
    if (st > dur && this.audioOffset > 0) {
      this.audioEl.pause();
      this.pause();
      this.statusLabel.textContent = 'Done';
      return;
    }

    // Update progress bar (session-relative)
    this.progressEl.style.width = ((Math.max(0, st) / dur) * 100) + '%';
    this.audioTimeEl.textContent = fmtSec(Math.max(0, st));
    this.elapsedEl.textContent = fmtSec(Math.max(0, st));

    // Find which message should be visible at this audio time
    if (!this.syncCues || this.syncCues.length === 0) return;

    // Find the last cue whose audio_s <= current time
    var targetMsgIndex = -1;
    var activeCueIndex = -1;
    var nextCue = null;
    for (var i = this.syncCues.length - 1; i >= 0; i--) {
      if (this.syncCues[i].audio_s <= t) {
        targetMsgIndex = this.syncCues[i].msgIndex;
        activeCueIndex = i;
        if (i + 1 < this.syncCues.length) nextCue = this.syncCues[i + 1];
        break;
      }
    }

    // Update active scene markers
    this._updateActiveScene(activeCueIndex);

    // Progressive rendering between cues:
    // Messages at or before the active cue render instantly.
    // Messages between the active cue and the next cue render progressively
    // based on time fraction, so user prompts and agent responses scroll in naturally.
    var activeMsgIndex = targetMsgIndex;
    var progressMsgIndex = activeMsgIndex; // how far to actually render

    if (nextCue && activeCueIndex >= 0) {
      var cueStart = this.syncCues[activeCueIndex].audio_s;
      var cueEnd = nextCue.audio_s;
      var nextMsgIndex = nextCue.msgIndex;
      var span = nextMsgIndex - activeMsgIndex;
      if (span > 1 && cueEnd > cueStart) {
        var frac = (t - cueStart) / (cueEnd - cueStart);
        frac = Math.max(0, Math.min(1, frac));
        // Reveal intermediate messages proportionally
        progressMsgIndex = activeMsgIndex + Math.floor(frac * span);
        if (progressMsgIndex >= nextMsgIndex) progressMsgIndex = nextMsgIndex - 1;
      }
    }

    if (progressMsgIndex > this.renderedUpTo) {
      this._removePendingIndicator();
      this._renderInstantUpTo(progressMsgIndex);
    }

    // Show "thinking..." indicator if we've caught up and next message is agent
    if (nextCue && progressMsgIndex >= 0 && progressMsgIndex === this.renderedUpTo) {
      var effectiveNext = progressMsgIndex + 1;
      if (effectiveNext < this.messages.length) {
        var nextMsg = this.messages[effectiveNext];
        if (nextMsg && nextMsg.role === 'assistant' && !this._pendingEl) {
          this._showPendingIndicator(nextCue.label);
        }
      }
    }
  };

  // ── Pending / thinking indicator ──
  Player.prototype._showPendingIndicator = function(label) {
    this._pendingEl = h('div','oce-msg assistant oce-pending animated');
    var role = h('div','oce-role');
    role.appendChild(h('div','oce-role-icon', I.agent));
    role.appendChild(h('span','oce-role-lbl', 'Agent'));
    this._pendingEl.appendChild(role);
    var content = h('div','oce-content');
    var dots = h('span','oce-thinking-dots');
    dots.innerHTML = '<span class="oce-dot-1">.</span><span class="oce-dot-2">.</span><span class="oce-dot-3">.</span>';
    content.appendChild(dots);
    if (label) {
      var lbl = h('span','oce-pending-label', label);
      content.appendChild(lbl);
    }
    this._pendingEl.appendChild(content);
    this.chat.appendChild(this._pendingEl);
    this._scroll();
  };

  Player.prototype._removePendingIndicator = function() {
    if (this._pendingEl) {
      this._pendingEl.remove();
      this._pendingEl = null;
    }
  };

  // ── Update which scene button/dot is active ──
  Player.prototype._updateActiveScene = function(activeCueIndex) {
    // Scene dots
    if (this.sceneMarkerEls) {
      for (var i = 0; i < this.sceneMarkerEls.length; i++) {
        var ci = parseInt(this.sceneMarkerEls[i].dot.dataset.cueIndex);
        this.sceneMarkerEls[i].dot.classList.toggle('active', ci <= activeCueIndex);
      }
    }
    // Scene buttons
    if (this.sceneBtnEls) {
      var sceneIdx = 0;
      for (var j = 0; j < this.sceneBtnEls.length; j++) {
        var isBefore = this.sceneBtnEls[j].cue.audio_s <= this._currentTime();
        this.sceneBtnEls[j].btn.classList.toggle('active', isBefore);
      }
    }
  };

  // ── Render messages 0..N instantly (no animation) ──
  Player.prototype._renderInstantUpTo = function(msgIndex) {
    // Only render messages we haven't rendered yet
    var start = this.renderedUpTo + 1;
    for (var i = start; i <= msgIndex && i < this.messages.length; i++) {
      var msg = this.messages[i];
      var el = this._createMsgInstant(msg);
      this.chat.appendChild(el);
    }
    this.renderedUpTo = msgIndex;
    this._scroll();
  };

  // ── Create a fully rendered message element (no animation) ──
  Player.prototype._createMsgInstant = function(msg) {
    var el = h('div','oce-msg ' + msg.role);

    var role = h('div','oce-role');
    role.appendChild(h('div','oce-role-icon', msg.role==='user' ? I.user : I.agent));
    role.appendChild(h('span','oce-role-lbl', msg.role==='user' ? 'You' : 'Agent'));
    role.appendChild(h('span','oce-role-time', fmtTime(msg.timestamp_ms)));
    el.appendChild(role);

    // Reasoning (collapsible, OpenCode-style)
    if (this.config.show_thinking && msg.thinking) {
      el.appendChild(this._createReasoningInstant(msg.thinking));
    }

    // Tool calls (between reasoning and content)
    if (msg.tool_calls && msg.tool_calls.length > 0) {
      for (var ti = 0; ti < msg.tool_calls.length; ti++) {
        el.appendChild(this._createToolCallInstant(msg.tool_calls[ti]));
      }
    }

    // Content
    if (msg.content) {
      var content = h('div','oce-content');
      if (msg.role === 'user') {
        content.textContent = msg.content;
      } else {
        content.innerHTML = renderMd(msg.content);
      }
      el.appendChild(content);
    }

    return el;
  };

  // ── Create reasoning block (collapsible, OpenCode-style) ──
  Player.prototype._createReasoningInstant = function(thinking) {
    var el = h('div','oce-reasoning');
    var hdr = h('div','oce-reasoning-hdr');
    hdr.appendChild(h('span','oce-reasoning-icon', I.brain));
    hdr.appendChild(h('span','oce-reasoning-lbl', 'thinking'));
    var preview = thinking.substring(0, 100).replace(/\n/g, ' ');
    if (thinking.length > 100) preview += '...';
    hdr.appendChild(h('span','oce-reasoning-preview', preview));
    el.appendChild(hdr);
    var body = h('div','oce-reasoning-body');
    body.innerHTML = renderMd(thinking);
    el.appendChild(body);
    hdr.addEventListener('click', function() { el.classList.toggle('exp'); });
    return el;
  };

  // ── Create a fully rendered tool call (OpenCode-style) ──
  Player.prototype._createToolCallInstant = function(tc) {
    var el = h('div','oce-tc');
    var hdr = h('div','oce-tc-h');

    // Left indicator bar
    var indicator = h('div','oce-tc-indicator');
    hdr.appendChild(indicator);

    var hdrContent = h('div','oce-tc-h-content');

    // Tool icon
    hdrContent.appendChild(h('span','oce-tc-icon',I.tool));

    // Tool name
    hdrContent.appendChild(h('span','oce-tc-name',tc.name));

    // Args preview (dots + values like OpenCode)
    var argsEl = h('div','oce-tc-args');
    var argEntries = this._formatToolArgs(tc);
    for (var ai = 0; ai < argEntries.length && ai < 3; ai++) {
      var argEl = h('span','oce-tc-arg');
      argEl.appendChild(h('span','oce-tc-arg-dot'));
      argEl.appendChild(h('span','oce-tc-arg-val', argEntries[ai]));
      argsEl.appendChild(argEl);
    }
    hdrContent.appendChild(argsEl);

    // Duration
    if (tc.duration_ms && tc.duration_ms > 2000) {
      hdrContent.appendChild(h('span','oce-tc-stats', (tc.duration_ms/1000).toFixed(1)+'s'));
    }

    hdr.appendChild(hdrContent);

    // Body (output, line-clamped)
    var body = h('div','oce-tc-body');
    var output = h('div','oce-tc-output');
    if (tc.result) {
      output.textContent = tc.result;
    } else {
      output.textContent = '(no output)';
    }
    body.appendChild(output);

    el.appendChild(hdr);
    el.appendChild(body);

    // Click to expand/collapse
    hdr.addEventListener('click', function() {
      el.classList.toggle('exp');
    });
    // Double-click to fully expand (remove line-clamp)
    output.addEventListener('click', function(e) {
      e.stopPropagation();
      el.classList.toggle('fully-exp');
    });

    return el;
  };

  // ── Format tool args for display ──
  Player.prototype._formatToolArgs = function(tc) {
    var args = [];
    if (tc.args) {
      if (tc.args.pattern) args.push(String(tc.args.pattern));
      if (tc.args.path) {
        var p = String(tc.args.path);
        // Strip common prefixes for readability
        p = p.replace(/^\/Users\/[^/]+\//, '~/');
        args.push(p);
      }
      if (tc.args.command) {
        var cmd = String(tc.args.command);
        args.push(cmd.length > 60 ? cmd.substring(0,60) + '...' : cmd);
      }
      if (tc.args.file_path) {
        var fp = String(tc.args.file_path);
        fp = fp.replace(/^\/Users\/[^/]+\//, '~/');
        args.push(fp);
      }
      if (tc.args.content && args.length === 0) args.push('(content)');
    }
    return args;
  };

  // ── Seek to a specific audio time (sec is in cue-space, i.e. absolute) ──
  Player.prototype.seekToAudioTime = function(sec) {
    this._removePendingIndicator();
    // Set time on real audio or simulated clock
    if (this.audioLoaded && this.audioEl) {
      this.audioEl.currentTime = sec;
    }
    this.simTime = sec;
    if (this.playing && !this.audioLoaded) {
      this._simWallStart = Date.now() - (sec * 1000);
    }

    // Clear chat and re-render up to the right message
    this.chat.innerHTML = '';
    this.renderedUpTo = -1;

    // Find target message
    if (this.syncCues) {
      var targetMsgIndex = -1;
      for (var i = this.syncCues.length - 1; i >= 0; i--) {
        if (this.syncCues[i].audio_s <= sec) {
          targetMsgIndex = this.syncCues[i].msgIndex;
          break;
        }
      }
      if (targetMsgIndex >= 0) {
        this._renderInstantUpTo(targetMsgIndex);
      }
    }

    // Update UI immediately
    this._onAudioTimeUpdate();

    // If we were playing with real audio, keep playing
    if (this.playing && this.audioLoaded && this.audioEl) {
      this.audioEl.play();
    }
  };

  // ── Scene navigation ──
  Player.prototype.seekNextScene = function() {
    if (!this.syncCues) return;
    var t = this._currentTime();
    var scenes = this.syncCues.filter(function(c) { return c.scene; });
    for (var i = 0; i < scenes.length; i++) {
      if (scenes[i].audio_s > t + 0.5) {
        this.seekToAudioTime(scenes[i].audio_s);
        return;
      }
    }
  };

  Player.prototype.seekPrevScene = function() {
    if (!this.syncCues) return;
    var t = this._currentTime();
    var scenes = this.syncCues.filter(function(c) { return c.scene; });
    for (var i = scenes.length - 1; i >= 0; i--) {
      if (scenes[i].audio_s < t - 1.5) {
        this.seekToAudioTime(scenes[i].audio_s);
        return;
      }
    }
    this.seekToAudioTime(this.audioOffset);
  };

  // ── Simulated clock (for when audio can't load) ──
  Player.prototype._startSimClock = function() {
    var self = this;
    if (this.simTime < this.audioOffset) this.simTime = this.audioOffset;
    this._simWallStart = Date.now() - (this.simTime * 1000);
    var logCount = 0;
    (function tick() {
      if (!self.playing) return;
      self.simTime = (Date.now() - self._simWallStart) / 1000;
      if (logCount++ < 5) console.log('[oce] simClock tick: t=' + self.simTime.toFixed(1) + ', renderedUpTo=' + self.renderedUpTo);
      self._onAudioTimeUpdate();
      if (self.simTime - self.audioOffset >= self.totalDuration) {
        if (self.looping) {
          self.simTime = self.audioOffset;
          self._simWallStart = Date.now() - (self.audioOffset * 1000);
          self.chat.innerHTML = '';
          self.renderedUpTo = -1;
        } else {
          self.pause();
          self.statusLabel.textContent = 'Done';
          return;
        }
      }
      requestAnimationFrame(tick);
    })();
  };

  // ── Play / Pause ──
  Player.prototype.play = function() {
    if (this.playing) return;
    this.playing = true;
    this.playBtn.innerHTML = I.pause;
    this.statusLabel.textContent = 'Playing';
    this.statusDot.className = 'oce-sdot rec';

    if (this.audioDriven) {
      console.log('[oce] play: audioDriven=true, audioLoaded=' + this.audioLoaded + ', syncCues=' + (this.syncCues ? this.syncCues.length : 0));
      if (this.audioLoaded) {
        // If audio is before session start, seek to offset
        if (this.audioEl.currentTime < this.audioOffset) {
          console.log('[oce] seeking to offset ' + this.audioOffset + ' (was ' + this.audioEl.currentTime + ')');
          this.audioEl.currentTime = this.audioOffset;
        }
        var p = this.audioEl.play();
        if (p && p.catch) p.catch(function(e) { console.error('[oce] play() rejected:', e); });
      } else {
        console.log('[oce] starting sim clock, totalDuration=' + this.totalDuration);
        this._startSimClock();
      }
    } else {
      // Non-audio mode: animated playback
      this.chat.innerHTML = '';
      this.renderedUpTo = -1;
      this.startWall = Date.now();
      this._updateElapsed();
      this._runAnimated();
    }
  };

  Player.prototype.pause = function() {
    this.playing = false;
    this.playBtn.innerHTML = I.play;
    this.statusLabel.textContent = 'Paused';
    this.statusDot.className = 'oce-sdot';

    if (this.audioDriven && this.audioEl) {
      this.audioEl.pause();
    }
  };

  Player.prototype.stop = function() {
    this.pause();
    if (this.audioDriven && this.audioEl) {
      this.audioEl.currentTime = this.audioOffset;
    }
    this.simTime = this.audioOffset;
    this.chat.innerHTML = '';
    this.renderedUpTo = -1;
    this.statusLabel.textContent = 'Ready';
  };

  // ── Non-audio animated playback (original mode) ──
  Player.prototype._updateElapsed = function() {
    var self = this;
    (function tick() {
      if (!self.playing) return;
      self.elapsedEl.textContent = fmtSec((Date.now() - self.startWall) / 1000);
      requestAnimationFrame(tick);
    })();
  };

  Player.prototype._runAnimated = async function() {
    do {
      for (var mi = 0; mi < this.messages.length; mi++) {
        if (!this.playing) return;
        var msg = this.messages[mi];
        var el = this._createMsg(msg);
        this.chat.appendChild(el);
        this._scroll();

        if (this.config.show_thinking && msg.thinking) {
          var thEl = this._createThinking();
          el.insertBefore(thEl, el.querySelector('.oce-content'));
          var thC = thEl.querySelector('.oce-think-c');
          await this._streamMd(thC, msg.thinking, this.config.thinking_typing_speed / 10);
        }

        var cEl = el.querySelector('.oce-content');
        if (cEl && msg.content) {
          if (msg.role === 'assistant') {
            await this._streamMd(cEl, msg.content, this.config.assistant_typing_speed / 20);
          } else {
            await this._typeHuman(cEl, msg.content);
          }
        }

        if (msg.tool_calls) {
          for (var ti = 0; ti < msg.tool_calls.length; ti++) {
            if (!this.playing) return;
            await this._animateToolCall(el, msg.tool_calls[ti]);
          }
        }

        this.renderedUpTo = mi;
        await this._delay(this.config.message_pause);
      }
    } while (this.looping && this.playing);

    this.playing = false;
    this.playBtn.innerHTML = I.play;
    this.statusLabel.textContent = 'Done';
    this.statusDot.className = 'oce-sdot';
  };

  // ── Animated message creation ──
  Player.prototype._createMsg = function(msg) {
    var el = h('div','oce-msg animated ' + msg.role);
    var role = h('div','oce-role');
    role.appendChild(h('div','oce-role-icon', msg.role==='user' ? I.user : I.agent));
    role.appendChild(h('span','oce-role-lbl', msg.role==='user' ? 'You' : 'Agent'));
    role.appendChild(h('span','oce-role-time', fmtTime(msg.timestamp_ms)));
    el.appendChild(role);
    el.appendChild(h('div','oce-content'));
    return el;
  };

  Player.prototype._createThinking = function() {
    var c = h('div','oce-think');
    c.appendChild(h('div','oce-think-lbl','Thinking'));
    c.appendChild(h('div','oce-think-c'));
    return c;
  };

  Player.prototype._typeHuman = async function(el, text) {
    var base = 1000 / this.config.user_typing_speed;
    var cursor = h('span','oce-cursor');
    el.appendChild(cursor);
    var words = text.split(/(?=\s)|(?<=\s)/);
    for (var wi = 0; wi < words.length; wi++) {
      if (!this.playing) break;
      var word = words[wi];
      if (word.trim().length > 0 && Math.random() < 0.15) {
        await this._delay(base * (8 + Math.random() * 15));
      }
      for (var ci = 0; ci < word.length; ci++) {
        if (!this.playing) break;
        var ch = word[ci];
        if (ch === '\n') el.insertBefore(document.createElement('br'), cursor);
        else el.insertBefore(document.createTextNode(ch), cursor);
        var d = base;
        if (ch===' ') d *= 0.5 + Math.random();
        else if ('.!?'.indexOf(ch) >= 0) d *= 2 + Math.random() * 3;
        else if (',;:'.indexOf(ch) >= 0) d *= 1.2 + Math.random() * 1.5;
        else d *= 0.6 + Math.random() * 0.8;
        this._scroll();
        await this._delay(d);
      }
    }
    await this._delay(200 + Math.random() * 300);
    cursor.remove();
  };

  Player.prototype._streamMd = async function(container, text, speed) {
    var blocks = parseMdBlocks(text);
    var lineDelay = 1000 / speed;
    var caret = h('span','oce-caret');
    container.appendChild(caret);
    for (var bi = 0; bi < blocks.length; bi++) {
      if (!this.playing) break;
      var block = blocks[bi];
      var bEl = h('div','mb');
      container.insertBefore(bEl, caret);
      var blines = block.raw.split('\n');
      for (var li = 0; li < blines.length; li++) {
        if (!this.playing) break;
        bEl.innerHTML = renderMd(blines.slice(0, li + 1).join('\n'));
        container.appendChild(caret);
        this._scroll();
        await this._delay(lineDelay);
      }
      bEl.innerHTML = block.html;
    }
    caret.remove();
  };

  Player.prototype._animateToolCall = async function(parentEl, tc) {
    await this._delay(this.config.tool_call_pause);
    var el = h('div','oce-tc animated');
    var hdr = h('div','oce-tc-h');
    hdr.appendChild(h('span','oce-tc-chev',I.chev));
    hdr.appendChild(h('span','oce-tc-icon',I.tool));
    hdr.appendChild(h('span','oce-tc-name',tc.name));
    var spinner = h('div','oce-spinner');
    hdr.appendChild(spinner);
    var body = h('div','oce-tc-body');
    el.appendChild(hdr); el.appendChild(body);
    parentEl.appendChild(el);
    this._scroll();

    var execTime = tc.duration_ms ? Math.min(tc.duration_ms / this.config.tool_speed, 2000) : 400 + Math.random() * 600;
    await this._delay(execTime);

    spinner.remove();
    var parts = [];
    if (tc.args && tc.args.path) parts.push(tc.args.path);
    if (tc.args && tc.args.command) { var cmd = tc.args.command; parts.push(cmd.length > 50 ? cmd.substring(0,50)+'...' : cmd); }
    if (tc.duration_ms) parts.push((tc.duration_ms/1000).toFixed(1)+'s');
    hdr.appendChild(h('span','oce-tc-stats',parts.join(' · ') || 'done'));
    var ck = h('span','',I.check); ck.style.color='#22c55e'; ck.style.marginLeft='6px'; ck.style.flexShrink='0';
    hdr.appendChild(ck);
    el.classList.add('exp');
    body.innerHTML = tc.result ? renderMd(tc.result) : '(no output)';
    hdr.addEventListener('click', function() { el.classList.toggle('exp'); });
    this._scroll();
  };

  Player.prototype._scroll = function() {
    this.chat.scrollTop = this.chat.scrollHeight;
  };

  Player.prototype._delay = function(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  };

  // ── Resolve sync cues: map message IDs to indices ──
  function resolveCues(cues, messages) {
    var idMap = {};
    for (var i = 0; i < messages.length; i++) {
      idMap[messages[i].id] = i;
    }
    return cues.map(function(c) {
      return {
        audio_s: c.audio_s,
        msgIndex: idMap[c.message] != null ? idMap[c.message] : -1,
        label: c.label || '',
        scene: !!c.scene,
      };
    }).filter(function(c) { return c.msgIndex >= 0; })
      .sort(function(a, b) { return a.audio_s - b.audio_s; });
  }

  // ── Public API ──
  window.OpenCodeEmbed = {
    mount: function(el, opts) {
      opts = opts || {};
      var audioSrc = opts.audio || AUDIO_SRC;
      var syncData = opts.sync || SYNC;
      var player = new Player(el, SESSION, META, CONFIG);
      player.looping = !!opts.loop;

      if (audioSrc && syncData && syncData.length > 0) {
        player.audioDriven = true;
        AUDIO_SRC = audioSrc;
        player.syncCues = resolveCues(syncData, SESSION);
      }

      player.build();

      if (opts.autoplay !== false && !player.audioDriven) {
        setTimeout(function() { player.play(); }, 300);
      }

      return player;
    }
  };
})();

    OpenCodeEmbed.mount(document.getElementById('opencode-embed'), {
      beginTime: 0,
      endTime: Infinity,
      loop: false,
      autoplay: true,
    });
  </script>
</body>
