<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides Replay — June 11, 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #09090b; color: #fafafa; font-family: 'Inter', -apple-system, sans-serif; }

  .player {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    border: 1px solid #1e1e22; border-radius: 8px;
    overflow: hidden; background: #09090b;
  }

  /* Top bar */
  .bar {
    background: #0c0c0e; border-bottom: 1px solid #1e1e22;
    padding: 0 14px; height: 36px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .bar-l { display: flex; align-items: center; gap: 8px; }
  .bar-title { font-size: 12px; color: #a1a1aa; font-weight: 500; }
  .bar-r { display: flex; align-items: center; gap: 6px; }
  .btn {
    background: #131316; border: 1px solid #27272a; border-radius: 5px;
    width: 28px; height: 24px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #a1a1aa; transition: background .1s; flex-shrink: 0;
  }
  .btn:hover { background: #1c1c20; }
  .btn svg { width: 12px; height: 12px; }

  /* Slide area */
  .slide-frame {
    flex: 1; position: relative; overflow: hidden; background: #1D1D40;
  }
  .slide-frame iframe {
    width: 100%; height: 100%; border: none;
    pointer-events: none; /* prevent interaction — audio drives it */
  }
  /* Slide number overlay */
  .slide-num {
    position: absolute; bottom: 8px; right: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px; color: rgba(255,255,255,0.3);
  }
  .slide-title-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    background: linear-gradient(rgba(9,9,11,0.7), transparent);
    padding: 8px 14px; font-size: 12px; color: #a1a1aa;
    font-weight: 500; pointer-events: none;
  }

  /* Audio bar */
  .audio-bar {
    background: #0c0c0e; border-top: 1px solid #1e1e22;
    padding: 6px 14px 8px; flex-shrink: 0;
  }
  .audio-row { display: flex; align-items: center; gap: 8px; }
  .audio-time {
    font-size: 10px; font-family: 'SF Mono', monospace;
    color: #52525b; min-width: 36px; text-align: center;
  }
  .timeline {
    flex: 1; position: relative; height: 20px;
    display: flex; align-items: center; cursor: pointer;
  }
  .track {
    width: 100%; height: 4px; background: #1e1e22;
    border-radius: 2px; position: relative; overflow: visible;
  }
  .progress {
    height: 100%; background: #6366f1; border-radius: 2px;
    width: 0%; transition: width 0.1s linear;
  }
  .scene-dot {
    position: absolute; top: 50%; width: 8px; height: 8px;
    background: #fafafa; border: 2px solid #6366f1; border-radius: 50%;
    transform: translate(-50%, -50%); cursor: pointer; z-index: 2;
    transition: transform .15s;
  }
  .scene-dot:hover { transform: translate(-50%, -50%) scale(1.4); }
  .scene-dot.active { background: #6366f1; }
  .scene-tooltip {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: #27272a; color: #fafafa; font-size: 10px;
    font-family: 'SF Mono', monospace; padding: 2px 8px; border-radius: 4px;
    white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .15s;
  }
  .scene-dot:hover .scene-tooltip { opacity: 1; }

  /* Scene buttons */
  .scenes { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .scene-btn {
    background: #131316; border: 1px solid #1e1e22; border-radius: 4px;
    padding: 1px 8px; font-size: 10px; font-family: 'SF Mono', monospace;
    color: #52525b; cursor: pointer; transition: all .1s; white-space: nowrap;
  }
  .scene-btn:hover { background: #1c1c20; color: #a1a1aa; border-color: #27272a; }
  .scene-btn.active { background: rgba(99,102,241,.12); color: #6366f1; border-color: rgba(99,102,241,.3); }

  /* Footer */
  .foot {
    background: #0c0c0e; border-top: 1px solid #1e1e22;
    padding: 0 14px; height: 24px; display: flex; align-items: center;
    justify-content: space-between; font-size: 10px;
    font-family: 'SF Mono', monospace; color: #3f3f46; flex-shrink: 0;
  }
  .sdot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; }
  .sdot.rec { background: #ef4444; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
</style>
</head>
<body>

<div class="player" id="player">
  <div class="bar">
    <div class="bar-l">
      <span class="bar-title">Agentic AI for Researchers — Slide Deck</span>
    </div>
    <div class="bar-r">
      <div class="btn" id="prevBtn" title="Previous scene">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </div>
      <div class="btn" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </div>
      <div class="btn" id="nextBtn" title="Next scene">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </div>
    </div>
  </div>

  <div class="slide-frame">
    <iframe id="slideFrame" src="slides.html"></iframe>
    <div class="slide-num" id="slideNum">1 / 48</div>
  </div>

  <div class="audio-bar">
    <div class="audio-row">
      <span class="audio-time" id="curTime">0:00</span>
      <div class="timeline" id="timeline">
        <div class="track" id="track">
          <div class="progress" id="progress"></div>
        </div>
      </div>
      <span class="audio-time" id="durTime">0:00</span>
    </div>
    <div class="scenes" id="scenes"></div>
  </div>

  <div class="foot">
    <div><span class="sdot" id="statusDot"></span><span id="statusLabel">Ready</span></div>
    <div id="elapsed">0:00</div>
  </div>
</div>

<script>
(function() {
  // Audio source
  var AUDIO_SRC = "https://github.com/codedthinking/ai-workshop/releases/download/v2026-06-11/2026-06-11T094408.m4a";

  // Sync cues: audio_s = seconds into recording, slide = 0-indexed slide number
  // Mapped from transcript analysis of T094408 recording
  var CUES = [
    { audio_s: 0,    slide: 0,  label: "Title", scene: true },
    { audio_s: 130,  slide: 1,  label: "Arc of the day" },
    { audio_s: 140,  slide: 2,  label: "Three claims", scene: true },
    { audio_s: 300,  slide: 3,  label: "Act 1: How LLMs work", scene: true },
    { audio_s: 330,  slide: 4,  label: "Chat completion" },
    { audio_s: 370,  slide: 5,  label: "Next-token predictor" },
    { audio_s: 408,  slide: 6,  label: "Tokens", scene: true },
    { audio_s: 499,  slide: 7,  label: "Vectors / embeddings" },
    { audio_s: 600,  slide: 8,  label: "Training vs inference cost", scene: true },
    { audio_s: 786,  slide: 9,  label: "Sunk cost" },
    { audio_s: 858,  slide: 10, label: "Fine-tuning" },
    { audio_s: 868,  slide: 11, label: "Quantization" },
    { audio_s: 920,  slide: 12, label: "Marginal cost of intelligence", scene: true },
    { audio_s: 1465, slide: 13, label: "Memento: no memory", scene: true },
    { audio_s: 1533, slide: 14, label: "Context window" },
    { audio_s: 1915, slide: 15, label: "System / user / assistant" },
    { audio_s: 1960, slide: 16, label: "Attention" },
    { audio_s: 1968, slide: 17, label: "Tool use", scene: true },
    { audio_s: 2100, slide: 18, label: "Act 2: Ecosystem", scene: true },
    { audio_s: 2130, slide: 19, label: "Unbundling argument" },
    { audio_s: 2160, slide: 20, label: "Five-layer stack", scene: true },
    { audio_s: 2400, slide: 21, label: "Choosing a model" },
    { audio_s: 2500, slide: 22, label: "Match model to task" },
    { audio_s: 2600, slide: 23, label: "Commoditization" },
    { audio_s: 2700, slide: 24, label: "Open–closed gap" },
    { audio_s: 2800, slide: 25, label: "Local models" },
    { audio_s: 2900, slide: 26, label: "Cloud vs local" },
    { audio_s: 3000, slide: 27, label: "The prescription", scene: true },
    { audio_s: 3100, slide: 28, label: "Harness, tools, model" },
    { audio_s: 3200, slide: 29, label: "Escape–enter loop", scene: true },
    { audio_s: 3300, slide: 30, label: "Natural language in" },
    { audio_s: 3400, slide: 31, label: "Hit Escape" },
    { audio_s: 3500, slide: 32, label: "CLAUDE.md" },
    { audio_s: 3600, slide: 33, label: "Skills & config", scene: true },
    { audio_s: 3700, slide: 34, label: "Skills are templates" },
    { audio_s: 3800, slide: 35, label: "One giant file = worse" },
    { audio_s: 3900, slide: 36, label: "Opinions, loosely held", scene: true },
    { audio_s: 3950, slide: 37, label: "Frontier model" },
    { audio_s: 4050, slide: 38, label: "Subscriptions" },
    { audio_s: 4150, slide: 39, label: "opencode > Claude Code" },
    { audio_s: 4250, slide: 40, label: "Words, not magic" },
    { audio_s: 4350, slide: 41, label: "Durable advantage", scene: true },
    { audio_s: 4500, slide: 42, label: "Act 3", scene: true },
    { audio_s: 4550, slide: 43, label: "Empty folder" },
    { audio_s: 4600, slide: 44, label: "Empty folder (content)" },
    { audio_s: 4800, slide: 45, label: "Closing", scene: true },
    { audio_s: 4900, slide: 46, label: "Durable investment" },
    { audio_s: 5000, slide: 47, label: "Thank you" },
  ];

  var TOTAL_SLIDES = 48;
  var AUDIO_OFFSET = 60; // skip first 60s of recording

  // State
  var audio = new Audio();
  audio.preload = 'metadata';
  audio.src = AUDIO_SRC;
  var audioLoaded = false;
  var playing = false;
  var currentSlide = -1;
  var totalDuration = CUES[CUES.length - 1].audio_s - AUDIO_OFFSET + 60;
  var slideFrame = document.getElementById('slideFrame');
  var revealReady = false;

  // Wait for reveal.js in iframe to initialize
  slideFrame.addEventListener('load', function() {
    // Give reveal.js time to init
    setTimeout(function() {
      revealReady = true;
      goToSlide(0);
    }, 1000);
  });

  function goToSlide(n) {
    if (!revealReady || n === currentSlide || n < 0 || n >= TOTAL_SLIDES) return;
    currentSlide = n;
    try {
      slideFrame.contentWindow.Reveal.slide(n);
    } catch(e) {
      console.warn('[slides] cannot control iframe:', e);
    }
    document.getElementById('slideNum').textContent = (n + 1) + ' / ' + TOTAL_SLIDES;
  }

  // Audio events
  audio.addEventListener('loadedmetadata', function() {
    if (isFinite(audio.duration) && audio.duration > 0) {
      audioLoaded = true;
      totalDuration = audio.duration;
      document.getElementById('durTime').textContent = fmtSec(totalDuration);
      positionMarkers();
    }
  });

  audio.addEventListener('timeupdate', onTimeUpdate);

  audio.addEventListener('ended', function() {
    pause();
    document.getElementById('statusLabel').textContent = 'Done';
  });

  audio.addEventListener('error', function() {
    audioLoaded = false;
    document.getElementById('durTime').textContent = fmtSec(totalDuration);
    positionMarkers();
  });

  setTimeout(function() {
    if (!audioLoaded) {
      document.getElementById('durTime').textContent = fmtSec(totalDuration);
      positionMarkers();
    }
  }, 500);

  function fmtSec(s) {
    s = Math.floor(s);
    var m = Math.floor(s / 60);
    return m + ':' + String(s % 60).padStart(2, '0');
  }

  function onTimeUpdate() {
    var t = audio.currentTime;
    var st = t - AUDIO_OFFSET; // session-relative time

    // Stop at end
    if (st > totalDuration) { pause(); document.getElementById('statusLabel').textContent = 'Done'; return; }

    // Update progress (session-relative)
    document.getElementById('progress').style.width = ((Math.max(0, st) / totalDuration) * 100) + '%';
    document.getElementById('curTime').textContent = fmtSec(Math.max(0, st));
    document.getElementById('elapsed').textContent = fmtSec(Math.max(0, st));

    // Find current cue
    var targetSlide = 0;
    for (var i = CUES.length - 1; i >= 0; i--) {
      if (CUES[i].audio_s <= t) {
        targetSlide = CUES[i].slide;
        break;
      }
    }
    goToSlide(targetSlide);

    // Update scene button highlights
    var sceneBtns = document.querySelectorAll('.scene-btn');
    sceneBtns.forEach(function(btn) {
      var s = parseFloat(btn.dataset.audioS);
      btn.classList.toggle('active', s <= t);
    });

    // Update scene dots
    var dots = document.querySelectorAll('.scene-dot');
    dots.forEach(function(dot) {
      var s = parseFloat(dot.dataset.audioS);
      dot.classList.toggle('active', s <= t);
    });
  }

  // Seek
  function seekTo(sec) {
    if (audioLoaded) {
      audio.currentTime = sec;
    }
    onTimeUpdate();
    if (playing && audioLoaded) {
      audio.play();
    }
  }

  // Build scene markers and buttons
  function positionMarkers() {
    var track = document.getElementById('track');
    // Remove old dots
    track.querySelectorAll('.scene-dot').forEach(function(d) { d.remove(); });

    var scenes = CUES.filter(function(c) { return c.scene; });
    scenes.forEach(function(c) {
      var dot = document.createElement('div');
      dot.className = 'scene-dot';
      dot.dataset.audioS = c.audio_s;
      dot.style.left = (((c.audio_s - AUDIO_OFFSET) / totalDuration) * 100) + '%';
      var tip = document.createElement('div');
      tip.className = 'scene-tooltip';
      tip.textContent = c.label;
      dot.appendChild(tip);
      dot.addEventListener('click', function(e) {
        e.stopPropagation();
        seekTo(c.audio_s);
      });
      track.appendChild(dot);
    });
  }

  // Build scene buttons
  var scenesEl = document.getElementById('scenes');
  CUES.filter(function(c) { return c.scene; }).forEach(function(c) {
    var btn = document.createElement('div');
    btn.className = 'scene-btn';
    btn.textContent = c.label;
    btn.dataset.audioS = c.audio_s;
    btn.addEventListener('click', function() { seekTo(c.audio_s); });
    scenesEl.appendChild(btn);
  });

  // Timeline click
  document.getElementById('timeline').addEventListener('click', function(e) {
    var rect = document.getElementById('track').getBoundingClientRect();
    var frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    seekTo(AUDIO_OFFSET + frac * totalDuration);
  });

  // Controls
  function play() {
    if (playing) return;
    playing = true;
    document.getElementById('playIcon').style.display = 'none';
    document.getElementById('pauseIcon').style.display = '';
    document.getElementById('statusLabel').textContent = 'Playing';
    document.getElementById('statusDot').className = 'sdot rec';
    if (audioLoaded) {
      if (audio.currentTime < AUDIO_OFFSET) audio.currentTime = AUDIO_OFFSET;
      var p = audio.play();
      if (p && p.catch) p.catch(function(e) { console.error('[slides] play rejected:', e); });
    }
  }

  function pause() {
    playing = false;
    document.getElementById('playIcon').style.display = '';
    document.getElementById('pauseIcon').style.display = 'none';
    document.getElementById('statusLabel').textContent = 'Paused';
    document.getElementById('statusDot').className = 'sdot';
    audio.pause();
  }

  document.getElementById('playBtn').addEventListener('click', function() {
    if (playing) pause(); else play();
  });

  document.getElementById('prevBtn').addEventListener('click', function() {
    var t = audio.currentTime;
    var scenes = CUES.filter(function(c) { return c.scene; });
    for (var i = scenes.length - 1; i >= 0; i--) {
      if (scenes[i].audio_s < t - 1.5) { seekTo(scenes[i].audio_s); return; }
    }
    seekTo(AUDIO_OFFSET);
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    var t = audio.currentTime;
    var scenes = CUES.filter(function(c) { return c.scene; });
    for (var i = 0; i < scenes.length; i++) {
      if (scenes[i].audio_s > t + 0.5) { seekTo(scenes[i].audio_s); return; }
    }
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') { e.preventDefault(); if (playing) pause(); else play(); }
    if (e.code === 'ArrowRight') { seekTo(audio.currentTime + 10); }
    if (e.code === 'ArrowLeft') { seekTo(Math.max(AUDIO_OFFSET, audio.currentTime - 10)); }
  });
})();
</script>
</body>
</html>
