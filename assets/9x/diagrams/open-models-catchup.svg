<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'Brockmann','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;display=swap');
      .mono { font-family: 'DM Mono', ui-monospace, monospace; }
      .t  { fill:#fff; font-weight:700; }
      .l  { fill:#D4D2E3; }
      .m  { fill:#9795B5; }
      .red{ fill:#E61E25; }
      .cy { fill:#35E0D8; }
      .am { fill:#E0A85A; }
    </style>
    <marker id="cap-r" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#E61E25"/></marker>
    <marker id="cap-c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#35E0D8"/></marker>
    <marker id="lag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse"><path d="M0,0 L7,3 L0,6 Z" fill="#E0A85A"/></marker>
  </defs>

  <rect width="1040" height="600" fill="#1D1D40"/>

  <!-- header -->
  <text x="50" y="46" class="mono cy" font-size="13" letter-spacing="3">~ OPEN MODELS PLAY CATCH-UP</text>
  <text x="50" y="82" class="t" font-size="26">Open weights trail the frontier &#8212; by months, not years</text>
  <text x="50" y="108" class="m" font-size="14">The best open-weight model reaches each capability level shortly after the closed frontier &#8212; and the lag keeps shrinking.</text>

  <!-- legend -->
  <g font-size="12.5">
    <line x1="640" y1="46" x2="668" y2="46" stroke="#E61E25" stroke-width="3"/><text x="676" y="50" class="l">closed frontier</text>
    <line x1="800" y1="46" x2="828" y2="46" stroke="#35E0D8" stroke-width="3"/><text x="836" y="50" class="l">best open-weight</text>
  </g>

  <!-- axes -->
  <line x1="100" y1="120" x2="100" y2="470" stroke="#9795B5" stroke-width="1.2"/>
  <line x1="100" y1="470" x2="980" y2="470" stroke="#9795B5" stroke-width="1.2"/>
  <text x="92" y="130" class="mono m" font-size="11" text-anchor="end">capability &#8593;</text>

  <!-- year gridlines -->
  <g stroke="rgba(151,149,181,0.12)" stroke-width="1">
    <line x1="210" y1="120" x2="210" y2="470"/>
    <line x1="430" y1="120" x2="430" y2="470"/>
    <line x1="650" y1="120" x2="650" y2="470"/>
    <line x1="870" y1="120" x2="870" y2="470"/>
  </g>
  <g class="mono m" font-size="11.5" text-anchor="middle">
    <text x="120" y="490">2022</text>
    <text x="210" y="490">2023</text>
    <text x="430" y="490">2024</text>
    <text x="650" y="490">2025</text>
    <text x="870" y="490">2026</text>
  </g>

  <!-- lag arrows (shrinking gap) -->
  <g>
    <line x1="240" y1="267" x2="417" y2="267" stroke="#E0A85A" stroke-width="1.4" stroke-dasharray="4 3" marker-start="url(#lag)" marker-end="url(#lag)"/>
    <text x="328" y="261" class="mono am" font-size="11.5" text-anchor="middle">&#8776; 12 months</text>
    <line x1="452" y1="211" x2="549" y2="211" stroke="#E0A85A" stroke-width="1.4" stroke-dasharray="4 3" marker-start="url(#lag)" marker-end="url(#lag)"/>
    <text x="500" y="205" class="mono am" font-size="11.5" text-anchor="middle">&#8776; 6 months</text>
    <line x1="613" y1="172.5" x2="659" y2="172.5" stroke="#E0A85A" stroke-width="1.4" stroke-dasharray="4 3" marker-start="url(#lag)" marker-end="url(#lag)"/>
    <text x="636" y="159" class="mono am" font-size="11.5" text-anchor="middle">&#8776; weeks</text>
  </g>

  <!-- closed frontier line -->
  <polyline fill="none" stroke="#E61E25" stroke-width="2.5"
    points="177,330 254,253 386,232 496,197 628,169 760,148 936,130.5" marker-end="url(#cap-r)"/>
  <g fill="#E61E25">
    <circle cx="254" cy="253" r="4"/><circle cx="496" cy="197" r="4"/><circle cx="628" cy="169" r="4"/>
  </g>

  <!-- open-weight line -->
  <polyline fill="none" stroke="#35E0D8" stroke-width="2.5"
    points="232,337 320,312.5 419,267 551,211 639,183 661,172.5 782,155 936,137.5" marker-end="url(#cap-c)"/>
  <g fill="#35E0D8">
    <circle cx="419" cy="267" r="4"/><circle cx="551" cy="211" r="4"/><circle cx="661" cy="172.5" r="4"/><circle cx="782" cy="155" r="4"/>
  </g>

  <!-- closed labels -->
  <g class="mono red" font-size="11">
    <text x="260" y="247">GPT-4</text>
    <text x="492" y="189" text-anchor="middle">GPT-4o &#183; Claude 3</text>
    <text x="628" y="161" text-anchor="middle">o1</text>
    <text x="930" y="124" text-anchor="end">frontier</text>
  </g>

  <!-- open labels -->
  <g class="mono cy" font-size="11">
    <text x="232" y="353" text-anchor="middle">LLaMA</text>
    <text x="419" y="285" text-anchor="middle">Mixtral</text>
    <text x="556" y="228">Llama 3.1 405B</text>
    <text x="678" y="190">DeepSeek-R1</text>
    <text x="788" y="146">Qwen3 &#183; Llama 4</text>
  </g>

  <!-- source -->
  <text x="50" y="528" class="mono m" font-size="11.5">Schematic, based on Epoch AI notable-models data (epoch.ai/data/ai-models). Positions illustrative, not exact benchmark values.</text>
</svg>
