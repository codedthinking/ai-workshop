<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="'Brockmann','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;display=swap');
      .mono { font-family: 'DM Mono', ui-monospace, monospace; }
      .t  { fill:#fff; font-weight:700; }
      .l  { fill:#D4D2E3; }
      .m  { fill:#9795B5; }
      .red{ fill:#E61E25; }
      .cy { fill:#35E0D8; }
    </style>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9795B5"/>
    </marker>
    <marker id="ac" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#35E0D8"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#1D1D40"/>

  <!-- header -->
  <text x="50" y="52" class="mono cy" font-size="13" letter-spacing="3">~ ANATOMY OF A CHAT COMPLETION</text>
  <text x="50" y="92" class="t" font-size="32">System, user, assistant</text>
  <text x="50" y="120" class="m" font-size="15">A conversation is just a list of role-tagged messages. The model reads them all and writes the next assistant turn.</text>

  <!-- context window container -->
  <text x="50" y="160" class="mono cy" font-size="12.5" letter-spacing="1.5">CONTEXT WINDOW &#183; the entire transcript, re-sent on every call</text>
  <rect x="50" y="172" width="640" height="392" rx="12" fill="none" stroke="rgba(151,149,181,0.4)" stroke-dasharray="6 5"/>

  <!-- system -->
  <rect x="70" y="190" width="600" height="66" rx="9" fill="#2C2C5A" stroke="rgba(151,149,181,0.18)"/>
  <rect x="70" y="190" width="4" height="66" rx="2" fill="#E61E25"/>
  <text x="90" y="216" class="mono red" font-size="12" letter-spacing="1.5">SYSTEM</text>
  <text x="90" y="240" class="l" font-size="14.5">Who the model is, the rules it follows, the tools it may call, the constraints.</text>

  <!-- user 1 -->
  <rect x="70" y="266" width="600" height="60" rx="9" fill="#24244D" stroke="rgba(151,149,181,0.18)"/>
  <rect x="70" y="266" width="4" height="60" rx="2" fill="#35E0D8"/>
  <text x="90" y="290" class="mono cy" font-size="12" letter-spacing="1.5">USER</text>
  <text x="90" y="312" class="l" font-size="14.5">&#8220;Write a Stata script that collapses sales to firm-year means.&#8221;</text>

  <!-- assistant 1 -->
  <rect x="70" y="336" width="600" height="60" rx="9" fill="#24244D" stroke="rgba(151,149,181,0.18)"/>
  <rect x="70" y="336" width="4" height="60" rx="2" fill="#D4D2E3"/>
  <text x="90" y="360" class="mono l" font-size="12" letter-spacing="1.5">ASSISTANT</text>
  <text x="90" y="382" class="l" font-size="14.5">&#8220;Here is collapse.do &#8212; it reads sales.dta, then &#8230;&#8221;</text>

  <!-- user 2 -->
  <rect x="70" y="406" width="600" height="50" rx="9" fill="#24244D" stroke="rgba(151,149,181,0.18)"/>
  <rect x="70" y="406" width="4" height="50" rx="2" fill="#35E0D8"/>
  <text x="90" y="427" class="mono cy" font-size="12" letter-spacing="1.5">USER</text>
  <text x="90" y="446" class="l" font-size="14.5">&#8220;Now add a robustness check that drops the top 1%.&#8221;</text>

  <!-- assistant 2 (being generated) -->
  <rect x="70" y="466" width="600" height="78" rx="9" fill="#24244D" stroke="#E61E25" stroke-dasharray="6 4"/>
  <rect x="70" y="466" width="4" height="78" rx="2" fill="#D4D2E3"/>
  <text x="90" y="490" class="mono l" font-size="12" letter-spacing="1.5">ASSISTANT</text>
  <text x="90" y="513" class="m" font-size="13.5" font-style="italic">the model writes this turn, one token at a time &#8230;</text>
  <text x="652" y="538" class="mono red" font-size="12" text-anchor="end">generating &#9608;</text>

  <!-- arrow to LLM -->
  <line x1="690" y1="300" x2="838" y2="300" stroke="#9795B5" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="764" y="288" class="mono m" font-size="11.5" text-anchor="middle">prompt =</text>
  <text x="764" y="316" class="mono m" font-size="11.5" text-anchor="middle">full transcript</text>

  <!-- LLM -->
  <rect x="840" y="232" width="320" height="150" rx="12" fill="#24244D" stroke="rgba(230,30,37,0.5)"/>
  <text x="1000" y="295" class="t mono" font-size="40" text-anchor="middle">LLM</text>
  <text x="1000" y="330" class="m" font-size="13" text-anchor="middle">predicts the next token</text>
  <text x="1000" y="350" class="m" font-size="13" text-anchor="middle">over the whole transcript</text>

  <!-- completion arrow back to assistant 2 -->
  <path d="M1000 382 L1000 505 L672 505" fill="none" stroke="#35E0D8" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="900" y="497" class="mono cy" font-size="11.5" text-anchor="middle">completion &#8594; next assistant turn</text>

  <!-- footer note -->
  <text x="600" y="600" class="mono m" font-size="13" text-anchor="middle">Stateless: the model keeps no memory between calls &#8212; the full history is sent every single time.</text>
  <text x="1150" y="614" class="mono m" font-size="10" text-anchor="end" opacity="0.7">the9x.ac &#183; Agentic AI for Researchers</text>
</svg>
