<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'Brockmann','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;display=swap');
      .mono { font-family: 'DM Mono', ui-monospace, monospace; }
      .t  { fill:#fff; font-weight:700; }
      .l  { fill:#D4D2E3; }
      .m  { fill:#9795B5; }
      .red{ fill:#E61E25; }
      .cy { fill:#35E0D8; }
      .am { fill:#E0A85A; }
    </style>
    <marker id="er" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#E61E25"/></marker>
    <marker id="ec" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#35E0D8"/></marker>
    <marker id="el" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse"><path d="M0,0 L7,3 L0,6 Z" fill="#E0A85A"/></marker>
  </defs>

  <rect width="1040" height="600" fill="#1D1D40"/>

  <!-- header -->
  <text x="50" y="46" class="mono cy" font-size="13" letter-spacing="3">~ THE OPEN&#8211;CLOSED GAP</text>
  <text x="50" y="82" class="t" font-size="26">How far open weights trail the closed frontier</text>
  <text x="50" y="108" class="m" font-size="14">Measured with Epoch's Capabilities Index (ECI). The gap stays small and roughly stable &#8212; a few months behind.</text>

  <!-- legend -->
  <g font-size="12.5">
    <line x1="600" y1="46" x2="628" y2="46" stroke="#E61E25" stroke-width="3"/><text x="636" y="50" class="l">best closed</text>
    <line x1="730" y1="46" x2="758" y2="46" stroke="#35E0D8" stroke-width="3"/><text x="766" y="50" class="l">best open-weight</text>
    <rect x="900" y="40" width="13" height="13" rx="2" fill="#9795B5" fill-opacity="0.35"/><text x="920" y="50" class="l">the gap</text>
  </g>

  <!-- axes -->
  <line x1="100" y1="120" x2="100" y2="470" stroke="#9795B5" stroke-width="1.2"/>
  <line x1="100" y1="470" x2="980" y2="470" stroke="#9795B5" stroke-width="1.2"/>
  <text x="92" y="130" class="mono m" font-size="11" text-anchor="end">ECI &#8593;</text>

  <!-- year gridlines -->
  <g stroke="rgba(151,149,181,0.12)" stroke-width="1">
    <line x1="100" y1="120" x2="100" y2="470"/>
    <line x1="393" y1="120" x2="393" y2="470"/>
    <line x1="687" y1="120" x2="687" y2="470"/>
    <line x1="980" y1="120" x2="980" y2="470"/>
  </g>
  <g class="mono m" font-size="11.5" text-anchor="middle">
    <text x="120" y="490">2023</text>
    <text x="393" y="490">2024</text>
    <text x="687" y="490">2025</text>
    <text x="962" y="490">2026</text>
  </g>

  <!-- gap band -->
  <polygon fill="#9795B5" fill-opacity="0.18"
    points="158.7,283 305.3,252.4 452,225.2 628,198 774.7,177.6 921.3,160.6 980,150.4 979,167.4 833.3,187.8 686.7,215 569.3,242.2 393.3,279.6 217.3,327.2"/>

  <!-- closed frontier -->
  <polyline fill="none" stroke="#E61E25" stroke-width="2.5"
    points="158.7,283 305.3,252.4 452,225.2 628,198 774.7,177.6 921.3,160.6 980,150.4" marker-end="url(#er)"/>
  <!-- open weight -->
  <polyline fill="none" stroke="#35E0D8" stroke-width="2.5"
    points="217.3,327.2 393.3,279.6 569.3,242.2 686.7,215 833.3,187.8 979,167.4" marker-end="url(#ec)"/>

  <!-- horizontal time-lag annotation at a fixed capability level -->
  <line x1="518" y1="215" x2="685" y2="215" stroke="#E0A85A" stroke-width="1.4" stroke-dasharray="4 3" marker-start="url(#el)" marker-end="url(#el)"/>
  <text x="601" y="209" class="mono am" font-size="11.5" text-anchor="middle">&#8776; a few months behind</text>

  <!-- vertical gap-today annotation -->
  <line x1="950" y1="155.6" x2="950" y2="171.5" stroke="#E0A85A" stroke-width="1.4" marker-start="url(#el)" marker-end="url(#el)"/>
  <text x="938" y="150" class="mono am" font-size="11.5" text-anchor="end">small, stable gap</text>

  <!-- model callouts -->
  <g class="mono red" font-size="11">
    <text x="628" y="192" text-anchor="middle">GPT / Claude / Gemini frontier</text>
  </g>
  <g class="mono cy" font-size="11">
    <text x="686" y="231" text-anchor="middle">DeepSeek &#183; Qwen &#183; Llama</text>
  </g>

  <!-- attribution -->
  <text x="50" y="524" class="mono m" font-size="11.5">Source: Epoch AI &#8212; Data Insight, &#8220;The gap between open and closed models&#8221; &#183; epoch.ai/data-insights/open-closed-eci-gap</text>
  <text x="50" y="542" class="mono m" font-size="11.5">Data licensed CC BY by Epoch AI. Figure recreated in-house; ECI values approximate &#8212; replace with the published series for exact numbers.</text>
</svg>
