<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ '/assets/logos/bead-favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="koren.dev home">
        {% include logo-koren-dev.svg %}
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Schedule</a>
        <a href="{{ '/prerequisites' | relative_url }}"{% if page.url contains 'prerequisites' %} class="active"{% endif %}>Prerequisites</a>
        <a href="{{ '/tools' | relative_url }}"{% if page.url contains 'tools' %} class="active"{% endif %}>Tools</a>
        <a href="{{ '/performance' | relative_url }}"{% if page.url contains 'performance' %} class="active"{% endif %}>Performance</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="https://codedthinking.com" class="logo-link" aria-label="Coded Thinking" target="_blank" rel="noopener">
        {% include logo-koren-dev.svg %}
      </a>
      <span class="copyright">&copy; 2025 Coded Thinking O&Uuml;</span>
    </div>
  </footer>

</body>
</html>
