<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ '/assets/logos/bead-favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="koren.dev home">
        {% include logo-koren-dev.svg %}
      </a>
      <nav>
        <a href="#schedule">Schedule</a>
        <a href="https://koren.dev" target="_blank" rel="noopener">koren.dev</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="https://codedthinking.com" class="logo-link" aria-label="Coded Thinking" target="_blank" rel="noopener">
        {% include logo-koren-dev.svg %}
      </a>
      <span class="copyright">&copy; 2025 Coded Thinking O&Uuml;</span>
    </div>
  </footer>

</body>
</html>
